name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build addon package
        run: |
          mkdir -p package/SNAP
          cp SNAP.toc package/SNAP/
          cp SNAP.lua package/SNAP/
          cd package
          zip -r ../SNAP.zip SNAP

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: SNAP
          path: SNAP.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SNAP.zip
